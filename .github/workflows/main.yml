name: QQQ Bot
on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 21:35 触发
    - cron: '35 13 * * *' 

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests yfinance pytz holidays
      - name: Run script
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py