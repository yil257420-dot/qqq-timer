name: QQQ Bot
on:
  workflow_dispatch:
  schedule:
    # 设定为 UTC 13:29:50，提前触发环境初始化，确保 13:30:00 准时执行核心逻辑
    - cron: '29 13 * * 1-5'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      # 仅安装 requests，杜绝一切版本依赖冲突
      - run: pip install requests
      - env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
