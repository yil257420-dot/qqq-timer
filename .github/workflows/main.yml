name: QQQ Bot
on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 13:30 触发，对齐美东 09:30 开盘
    - cron: '30 13 * * *' 

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: pip install requests yfinance pytz holidays
      - name: Run script
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
