name: QQQ Bot

on:
  workflow_dispatch:
  schedule:
    # 夏令时：UTC 13:30 = 美东 09:30
    # 冬令时：UTC 14:30 = 美东 09:30
    - cron: '30 13 * * *'
    - cron: '30 14 * * *'

jobs:
  run_bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests yfinance pytz pandas_market_calendars

      - name: Run bot
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
