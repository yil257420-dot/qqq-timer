name: QQQ Trading Bot
on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 13:30 运行，精确对齐美股开盘时间 (ET 09:30)
    - cron: '30 13 * * 1-5'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install yfinance requests pandas pandas-market-calendars
      - env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
