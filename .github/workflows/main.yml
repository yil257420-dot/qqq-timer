name: QQQ Trading Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 1-5'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      # 强制安装特定兼容版本组合，彻底修复 numpy/pandas 冲突
      - run: |
          pip install --upgrade pip
          pip install numpy==1.24.3 pandas==2.0.3 yfinance requests pandas-market-calendars
      - env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
