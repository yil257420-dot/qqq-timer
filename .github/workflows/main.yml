name: QQQ Trading Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 1-5'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      # 明确锁定 pandas 版本以解决类型报错
      - run: pip install yfinance requests pandas==2.0.3 pandas-market-calendars
      - env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
