name: QQQ Trading Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 1-5'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      # 只需要最基础的 requests 库
      - run: pip install requests
      - env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
        run: python run.py
